<!DOCTYPE html>
<html>
<head>
  <title>Confirmation Form</title>
</head>
<body>
  <center><h1>Confirmation Form</h1></center>
  


  <form>

    <table>

      <tr>
        <td>Student Name:<br><br></td>
        <td><input type="text" name="student_name" required><br><br></td>
      </tr>

      <tr>
        <td>Email Address:<br><br></td>
        <td><input type="email" name="email" required><br><br></td>
      </tr>

      <tr>
        <td>Preferred Internship Type:<br><br></td>

        <td><input type="radio" id="" name="internship_type" value="On-Site" required> On-Site<br><br></td>
      </tr>

      <tr>
  <td></td>
  <td>
    <input type="radio" id="" name="internship_type" value="Remote" required> Remote<br><br>
  </td>
</tr>

      <tr>
        <td>Internship Duration:<br><br></td>
        <td>
          <select name="duration" required>
            <option value="6-weeks">6 weeks</option>
            <option value="3-months">3 Months</option>
          </select><br><br>
        </td>
      </tr>

      <tr>
        <td>Skills of Interest: <br><br></td>
        <td><input type="checkbox" name="interests" value="Web_Development"> Web Development<br><br></td>
      </tr>

      <tr>
        <td></td>
        <td><input type="checkbox" name="interests" value="Data_Analysis"> Data Analysis<br><br></td>
      </tr>

      <tr>
        <td></td>
        <td><input type="checkbox" name="interests" value="Mobile_Apps"> Mobile Apps<br><br></td>
      </tr>

      <tr>
        <td></td>
        <td><input type="submit" ></td>
      </tr>

    </table>

  </form>
</body>
</html>
